<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
        <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#BB00FF;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#00F0FF;stop-opacity:1" />
        </linearGradient>
        <filter id="faviconGlow">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <rect fill="#0A0A0A" width="100" height="100"/>
    <rect x="30" y="30" width="40" height="40" fill="none" stroke="url(#faviconGradient)" 
          stroke-width="4" transform="rotate(45 50 50)" filter="url(#faviconGlow)"/>
    <rect x="37" y="37" width="26" height="26" fill="none" stroke="url(#faviconGradient)" 
          stroke-width="2.5" transform="rotate(45 50 50)" filter="url(#faviconGlow)"/>
</svg>







